services:
  openclaw-gateway:
    build:
      context: .
      args:
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE:-ghcr.io/openclaw/openclaw}
        OPENCLAW_BASE_IMAGE_TAG: ${OPENCLAW_BASE_IMAGE_TAG:-2026.5.2}
    image: ${OPENCLAW_GATEWAY_IMAGE_REPO:-openclaw-gateway-bastion}:${OPENCLAW_BASE_IMAGE_TAG:-2026.5.2}
    container_name: openclaw-gateway-bastion
    restart: unless-stopped
    privileged: true
    network_mode: host
    user: "0:0"
    environment:
      HOME: /home/openclaw
      OPENCLAW_STATE_DIR: /home/openclaw/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in .env}
    volumes:
      - /:/host:rw
      - /home/opc:/home/opc:rw
      - openclaw-node-state:/home/openclaw/.openclaw
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command:
      - openclaw
      - gateway
      - run
      - --force
      - --allow-unconfigured
      - --auth
      - token
      - --bind
      - lan
      - --port
      - ${OPENCLAW_GATEWAY_PORT:-18789}

volumes:
  openclaw-node-state:
